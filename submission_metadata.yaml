  - "Claude"

ai_usage_summary: |
  Used Claude (Anthropic) extensively as a pair-programming partner for
  architecture discussion, code review, and pattern engineering. Specifically:

  - Discussed scoring component design and weight allocation against the JD's
    explicit ideal-candidate profile.
  - Wrote first drafts of feature extraction, scoring, honeypot detection,
    reasoning generator with Claude; reviewed and edited every line.
  - Used Claude to interpret the JD's nuanced asks (e.g., the "Tier 5 candidate"
    trap, anti-keyword-stuffer principle, consulting-firm-only disqualifier).

  No candidate data was fed to any LLM. The ranker itself contains zero LLM
  calls (compute constraint compliance). All design decisions and final code
  were verified by the human author.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-component deterministic ranker. Per-candidate score is the weighted sum:

    0.28 * title_career   (title match + career-history evidence phrases)
    0.22 * skills         (required-cluster coverage with proficiency × endorsements × duration trust multiplier)
    0.13 * experience     (bell curve around JD's ideal 6-8 yrs)
    0.17 * jd_alignment   (production-deployment signals, anti-keyword-stuffer, anti-consulting-only, anti-research-only, anti-framework-enthusiast)
    0.05 * location       (Pune/Noida primary, Indian metros bonus, relocation aware)
    0.15 * semantic       (cached cosine vs JD seed text via all-MiniLM-L6-v2)

  Then multiplied by a behavioral modifier (0.4..1.0) combining recruiter
  response rate, recency, profile completeness, interview completion rate,
  open-to-work flag. Honeypot heuristics (impossible YoE vs role-duration sum,
  expert-with-zero-endorsement clusters, synthetic uniform durations) apply a
  subtractive penalty. Final score clamped [0, 1].

  Sentence-transformers embeddings (all-MiniLM-L6-v2, 90 MB, CPU) are
  pre-computed once for all 100K candidates against a hand-distilled JD seed
  text. The ranking step itself never loads the model — it reads cached
  cosine scores from JSON. Total ranking runtime: ~17 seconds for 100K.

  The decisive design moves: (1) trust multiplier on skills catches lazy
  keyword stuffing; (2) career-history phrase matching catches the JD's "Tier
  5" trap (non-AI-titled candidates who actually built ranking systems);
  (3) behavioral modifier respects the JD's explicit principle that low
  engagement means "for hiring purposes, not actually available."

